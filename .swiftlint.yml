opt_in_rules:
  - array_init
  - explicit_init
  - fatal_error_message
  - first_where
  - operator_usage_whitespace
  - overridden_super_call
  - prohibited_interface_builder
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_whitespace_closing_braces
  - weak_delegate

disabled_rules:
  # Style choices delegated to SwiftFormat (see .swiftformat)
  - explicit_self
  - trailing_comma
  # Size/complexity metrics that would need larger refactors; revisit individually
  - line_length
  - type_body_length
  - function_body_length
  - file_length
  - identifier_name
  - cyclomatic_complexity
  - implicitly_unwrapped_optional

# CodingKeys enums inside Decodable types are idiomatic at 2 levels deep
nesting:
  type_level: 2

excluded:
  - .build
  - DerivedData

included:
  - Sources
  - Tests

allow_zero_lintable_files: false
strict: false
