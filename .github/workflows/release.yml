name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_arch: arm64
            swift_arch: arm64
          - package_arch: intel
            swift_arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift Version
        run: swift --version

      - name: Resolve Version
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build Release
        run: swift build -c release --arch "${{ matrix.swift_arch }}"

      - name: Package App
        run: |
          chmod +x Scripts/package_app.sh
          ./Scripts/package_app.sh release "${{ matrix.package_arch }}"

      - name: Archive App
        run: |
          zip -r "OpenPorts-${{ steps.version.outputs.value }}-${{ matrix.package_arch }}.zip" OpenPorts.app
          shasum -a 256 "OpenPorts-${{ steps.version.outputs.value }}-${{ matrix.package_arch }}.zip" > "OpenPorts-${{ steps.version.outputs.value }}-${{ matrix.package_arch }}.sha256"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenPorts-${{ matrix.package_arch }}
          path: |
            OpenPorts-${{ steps.version.outputs.value }}-${{ matrix.package_arch }}.zip
            OpenPorts-${{ steps.version.outputs.value }}-${{ matrix.package_arch }}.sha256
          retention-days: 3

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve Version
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download ARM64 Artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenPorts-arm64
          path: artifacts

      - name: Download Intel Artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenPorts-intel
          path: artifacts

      - name: Validate Artifacts
        run: |
          ls -lh artifacts
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.value }}-arm64.zip"
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.value }}-intel.zip"
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.value }}-arm64.sha256"
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.value }}-intel.sha256"
          cat artifacts/*.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenPorts ${{ steps.version.outputs.value }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.value, '-') }}
          files: |
            artifacts/OpenPorts-${{ steps.version.outputs.value }}-arm64.zip
            artifacts/OpenPorts-${{ steps.version.outputs.value }}-intel.zip
            artifacts/OpenPorts-${{ steps.version.outputs.value }}-arm64.sha256
            artifacts/OpenPorts-${{ steps.version.outputs.value }}-intel.sha256

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'MohamedMohana/openports' && secrets.GH_TOKEN != ''

    steps:
      - name: Resolve Version
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: OpenPorts-*
          path: artifacts
          merge-multiple: true

      - name: Extract Checksums
        id: sha
        run: |
          ARM64_SHA=$(awk '{print $1}' artifacts/*-arm64.sha256)
          INTEL_SHA=$(awk '{print $1}' artifacts/*-intel.sha256)
          echo "arm64=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel=${INTEL_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Tap Repo
        uses: actions/checkout@v4
        with:
          repository: MohamedMohana/homebrew-tap
          token: ${{ secrets.GH_TOKEN }}
          path: tap

      - name: Update Cask
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          ARM64_SHA="${{ steps.sha.outputs.arm64 }}"
          INTEL_SHA="${{ steps.sha.outputs.intel }}"

          cat > tap/Casks/openports.rb <<EOF
          cask "openports" do
            version "${VERSION}"

            on_arm do
              url "https://github.com/MohamedMohana/openports/releases/download/${VERSION}/OpenPorts-${VERSION}-arm64.zip",
                  verified: "github.com/MohamedMohana/openports/"
              sha256 "${ARM64_SHA}"
            end

            on_intel do
              url "https://github.com/MohamedMohana/openports/releases/download/${VERSION}/OpenPorts-${VERSION}-intel.zip",
                  verified: "github.com/MohamedMohana/openports/"
              sha256 "${INTEL_SHA}"
            end

            name "OpenPorts"
            desc "Smart port monitoring for Mac developers"
            homepage "https://github.com/MohamedMohana/openports"

            auto_updates false
            depends_on macos: ">= :sonoma"

            app "OpenPorts.app"
          end
          EOF

      - name: Commit and Push Tap Changes
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/openports.rb
          git commit -m "Update openports to ${{ steps.version.outputs.value }}" || exit 0
          git push
