name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Package
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_arch: arm64
            swift_arch: arm64
          - package_arch: intel
            swift_arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Swift Version
        run: swift --version

      - name: Resolve Version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build Release
        run: swift build -c release --arch "${{ matrix.swift_arch }}"

      - name: Package App
        run: |
          chmod +x Scripts/package_app.sh
          ./Scripts/package_app.sh release "${{ matrix.package_arch }}"

      - name: Stage CLI Binary
        run: |
          BIN_PATH="$(swift build -c release --arch "${{ matrix.swift_arch }}" --show-bin-path)"
          cp "${BIN_PATH}/openports-cli" openports-cli
          codesign --force --sign - openports-cli

      - name: Archive App
        run: |
          zip -r "OpenPorts-${{ steps.version.outputs.tag }}-${{ matrix.package_arch }}.zip" OpenPorts.app openports-cli
          shasum -a 256 "OpenPorts-${{ steps.version.outputs.tag }}-${{ matrix.package_arch }}.zip" > "OpenPorts-${{ steps.version.outputs.tag }}-${{ matrix.package_arch }}.sha256"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OpenPorts-${{ matrix.package_arch }}
          path: |
            OpenPorts-${{ steps.version.outputs.tag }}-${{ matrix.package_arch }}.zip
            OpenPorts-${{ steps.version.outputs.tag }}-${{ matrix.package_arch }}.sha256
          retention-days: 3

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve Version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download ARM64 Artifact
        uses: actions/download-artifact@v8
        with:
          name: OpenPorts-arm64
          path: artifacts

      - name: Download Intel Artifact
        uses: actions/download-artifact@v8
        with:
          name: OpenPorts-intel
          path: artifacts

      - name: Validate Artifacts
        run: |
          ls -lh artifacts
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.tag }}-arm64.zip"
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.tag }}-intel.zip"
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.tag }}-arm64.sha256"
          test -f "artifacts/OpenPorts-${{ steps.version.outputs.tag }}-intel.sha256"
          cat artifacts/*.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: OpenPorts v${{ steps.version.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            artifacts/OpenPorts-${{ steps.version.outputs.tag }}-arm64.zip
            artifacts/OpenPorts-${{ steps.version.outputs.tag }}-intel.zip
            artifacts/OpenPorts-${{ steps.version.outputs.tag }}-arm64.sha256
            artifacts/OpenPorts-${{ steps.version.outputs.tag }}-intel.sha256

  update-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    if: github.repository == 'MohamedMohana/openports'
    env:
      HAS_TAP_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY != '' }}

    steps:
      - name: Resolve Version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Skip Tap Update Without Deploy Key
        if: env.HAS_TAP_KEY != 'true'
        run: echo "HOMEBREW_TAP_SSH_KEY is not configured; skipping Homebrew tap update."

      - name: Checkout OpenPorts Repo
        if: env.HAS_TAP_KEY == 'true'
        uses: actions/checkout@v7

      - name: Download Artifacts
        if: env.HAS_TAP_KEY == 'true'
        uses: actions/download-artifact@v8
        with:
          pattern: OpenPorts-*
          path: artifacts
          merge-multiple: true

      - name: Extract Checksums
        if: env.HAS_TAP_KEY == 'true'
        id: sha
        run: |
          ARM64_SHA=$(awk '{print $1}' artifacts/*-arm64.sha256)
          INTEL_SHA=$(awk '{print $1}' artifacts/*-intel.sha256)
          echo "arm64=${ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "intel=${INTEL_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout Tap Repo
        if: env.HAS_TAP_KEY == 'true'
        uses: actions/checkout@v7
        with:
          repository: MohamedMohana/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          path: tap

      - name: Update Cask
        if: env.HAS_TAP_KEY == 'true'
        run: |
          chmod +x Scripts/render_homebrew_cask.sh
          ./Scripts/render_homebrew_cask.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.sha.outputs.arm64 }}" \
            "${{ steps.sha.outputs.intel }}" \
            tap/Casks/openports.rb

      - name: Validate Cask Syntax
        if: env.HAS_TAP_KEY == 'true'
        run: ruby -c tap/Casks/openports.rb

      - name: Commit and Push Tap Changes
        if: env.HAS_TAP_KEY == 'true'
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/openports.rb
          git commit -m "Update openports to ${{ steps.version.outputs.version }}" || exit 0
          git push
