name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Format Check
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install SwiftLint and SwiftFormat
        run: brew install swiftlint swiftformat

      - name: Run SwiftFormat (Check Only)
        run: swiftformat Sources Tests --lint

      - name: Run SwiftLint
        run: swiftlint --strict

  test:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run Tests
        run: swift test --parallel

  package-smoke:
    name: Package Smoke Test (ARM64)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Swift Version
        run: swift --version

      - name: Build Release
        run: swift build -c release --arch arm64

      - name: CLI Smoke Test
        run: |
          BIN_PATH="$(swift build -c release --arch arm64 --show-bin-path)"
          # Runners can have zero listening sockets, so provide one.
          python3 -m http.server 39471 &
          LISTENER_PID=$!
          # Python can take many seconds to bind on a cold runner; wait until
          # the listener is visible to lsof before asserting on CLI output.
          for _ in $(seq 1 60); do
            if /usr/sbin/lsof -nP -iTCP -sTCP:LISTEN | grep -q ":39471 "; then
              break
            fi
            sleep 2
          done
          "${BIN_PATH}/openports-cli" --version
          "${BIN_PATH}/openports-cli" --format table
          "${BIN_PATH}/openports-cli" --format table | grep -q 39471
          "${BIN_PATH}/openports-cli" --format json > /dev/null
          "${BIN_PATH}/openports-cli" --format csv > /dev/null
          "${BIN_PATH}/openports-cli" --kill 39471 --force
          sleep 1
          if kill -0 "${LISTENER_PID}" 2>/dev/null; then
            echo "::error::openports-cli --kill did not terminate the listener"
            exit 1
          fi

      - name: Package App
        run: |
          chmod +x Scripts/package_app.sh
          ./Scripts/package_app.sh release arm64
          ls -lh OpenPorts.app

      - name: Verify App Bundle
        run: |
          if [ -d "OpenPorts.app" ]; then
            echo "OpenPorts.app created successfully"
          else
            echo "::error::OpenPorts.app was not created"
            exit 1
          fi
